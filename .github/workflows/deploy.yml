name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when the secret is configured; forks and PRs never see it.
    if: github.repository == 'go4cas/frontrunner'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Test
        run: bun test
      - name: Build
        run: bun run build
      - name: Deploy to here.now
        env:
          HERENOW_API_KEY: ${{ secrets.HERENOW_API_KEY }}
        run: |
          if [ -z "$HERENOW_API_KEY" ]; then
            echo "HERENOW_API_KEY secret not set — skipping deploy."
            exit 0
          fi
          bun run deploy
