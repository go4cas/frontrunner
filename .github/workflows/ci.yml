name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dev dependencies
        run: bun install --frozen-lockfile
      - name: Test (unit + DOM smoke)
        run: bun test
      - name: Build (script-injection guard + version-drift guard)
        run: bun run build
      - name: Verify the inline bundle parses as valid JS
        run: |
          node -e '
          const fs = require("fs");
          const html = fs.readFileSync("dist/index.html", "utf8");
          const open = "<script type=\"module\">";
          const start = html.indexOf(open) + open.length;
          const end = html.indexOf("</script>", start);
          if (start < open.length || end < 0) { console.error("inline bundle not found"); process.exit(1); }
          fs.writeFileSync("/tmp/bundle.mjs", html.slice(start, end));
          '
          node --check /tmp/bundle.mjs
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontrunner
          path: dist/index.html

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dev dependencies
        run: bun install --frozen-lockfile
      - name: Install Chromium
        run: bunx playwright install --with-deps chromium
      - name: Build
        run: bun run build
      - name: Browser smoke tests
        run: bunx playwright test

  deploy:
    needs: [test-and-build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'go4cas/frontrunner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build
        run: bun run build
      - name: Deploy to here.now
        env:
          HERENOW_API_KEY: ${{ secrets.HERENOW_API_KEY }}
        run: |
          if [ -z "$HERENOW_API_KEY" ]; then
            echo "::warning title=Deploy skipped::HERENOW_API_KEY secret not set — production was NOT updated."
            exit 0
          fi
          bun run deploy
